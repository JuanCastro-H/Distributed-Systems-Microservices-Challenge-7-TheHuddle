services:

  auth_service:

    build:
      context: ./auth_service
      dockerfile: Dockerfile

    container_name: auth_service

    ports:
      - "8001:8000"

    env_file:
      - ./auth_service/.env

    depends_on:
      - auth_db

  auth_db:

    image: postgres:16

    container_name: auth_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db

    ports:
      - "5433:5432"

    volumes:
      - auth_postgres_data:/var/lib/postgresql/data


volumes:
  auth_postgres_data: